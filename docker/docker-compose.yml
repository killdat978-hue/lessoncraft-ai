version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lessoncraft-postgres
    environment:
      POSTGRES_USER: lessoncraft
      POSTGRES_PASSWORD: lessoncraft123
      POSTGRES_DB: lessoncraft_ai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lessoncraft-network

  redis:
    image: redis:7-alpine
    container_name: lessoncraft-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - lessoncraft-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: lessoncraft-api
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://lessoncraft:lessoncraft123@postgres:5432/lessoncraft_ai
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - lessoncraft-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: lessoncraft-web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
    depends_on:
      - api
    networks:
      - lessoncraft-network

volumes:
  postgres_data:
  redis_data:

networks:
  lessoncraft-network:
    driver: bridge
